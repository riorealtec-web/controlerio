<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RealcontrolRio · Realtec Engenharia</title>
<meta name="theme-color" content="#0B1F3A">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --azul-escuro:#0B1F3A;
  --azul-claro:#1E88E5;
  --branco:#FFFFFF;
  --cinza:#F5F7FA;
  --verde:#1FA15A;
  --amarelo:#E5A823;
  --vermelho:#D64545;
  --borda:#E2E8F0;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--cinza);color:var(--azul-escuro);}
.app{display:flex;min-height:100vh;}
.sidebar{width:230px;background:var(--azul-escuro);color:#fff;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;}
.sidebar .logo{padding:22px 16px;font-weight:800;font-size:20px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar .logo span{color:var(--azul-claro);}
.navitem{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;font-size:14.5px;border-left:3px solid transparent;opacity:.85;}
.navitem:hover{background:rgba(255,255,255,.06);}
.navitem.active{background:rgba(30,136,229,.18);border-left:3px solid var(--azul-claro);opacity:1;font-weight:600;}
.navitem .ic{font-size:17px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:#fff;border-bottom:1px solid var(--borda);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5;}
.topbar h1{font-size:18px;margin:0;}
.userchip{display:flex;align-items:center;gap:10px;font-size:14px;}
.userchip .av{width:34px;height:34px;border-radius:50%;background:var(--azul-claro);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.content{padding:22px;flex:1;overflow-y:auto;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}
.card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--borda);}
.card .lbl{font-size:12.5px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.card .val{font-size:26px;font-weight:800;margin-top:6px;color:var(--azul-escuro);}
.card .sub{font-size:12px;margin-top:4px;color:#64748b;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.panel{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--borda);margin-bottom:16px;}
.panel h3{margin:0 0 12px;font-size:15px;color:var(--azul-escuro);}
button.btn{background:var(--azul-claro);color:#fff;border:none;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;}
button.btn:hover{background:#1769ad;}
button.btn.ghost{background:transparent;color:var(--azul-claro);border:1px solid var(--azul-claro);}
button.btn.green{background:var(--verde);}
button.btn.red{background:var(--vermelho);}
button.btn.sm{padding:6px 10px;font-size:12.5px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;padding:10px;background:var(--cinza);color:#475569;font-weight:700;border-bottom:1px solid var(--borda);}
td{padding:10px;border-bottom:1px solid var(--borda);}
tr:hover td{background:#fafcff;}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--borda);border-radius:7px;font-size:14px;margin-bottom:10px;background:#fff;}
label{font-size:12.5px;font-weight:600;color:#475569;display:block;margin-bottom:4px;}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.tag{padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;}
.tag.ativo{background:#dff5e6;color:var(--verde);}
.tag.pausado{background:#fff3da;color:var(--amarelo);}
.tag.finalizado{background:#e8edf3;color:#64748b;}
.tag.critico{background:#fde3e3;color:var(--vermelho);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--azul-escuro);color:#fff;padding:12px 18px;border-radius:8px;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:100;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
.modal-bg{position:fixed;inset:0;background:rgba(11,31,58,.45);display:none;align-items:center;justify-content:center;z-index:50;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;padding:22px;width:480px;max-width:92vw;max-height:88vh;overflow-y:auto;}
.modal h3{margin-top:0;}
.close-x{float:right;cursor:pointer;font-size:20px;color:#94a3b8;}
.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,var(--azul-escuro),#142d52);}
.login-box{background:#fff;padding:36px 34px;border-radius:14px;width:360px;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.login-box h2{color:var(--azul-escuro);margin-top:0;}
.login-box .brand{font-size:22px;font-weight:800;color:var(--azul-escuro);margin-bottom:4px;}
.login-box .brand span{color:var(--azul-claro);}
.ai-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--azul-claro);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:40;}
.ai-panel{position:fixed;bottom:92px;right:24px;width:340px;max-height:480px;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.25);display:none;flex-direction:column;z-index:40;overflow:hidden;}
.ai-panel.show{display:flex;}
.ai-head{background:var(--azul-escuro);color:#fff;padding:12px 16px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;font-size:13.5px;background:var(--cinza);}
.ai-msg{margin-bottom:10px;max-width:85%;padding:8px 11px;border-radius:10px;line-height:1.4;}
.ai-msg.bot{background:#fff;border:1px solid var(--borda);}
.ai-msg.user{background:var(--azul-claro);color:#fff;margin-left:auto;}
.ai-input{display:flex;border-top:1px solid var(--borda);}
.ai-input input{border:none;margin:0;border-radius:0;}
.ai-input button{border:none;background:var(--azul-claro);color:#fff;padding:0 16px;cursor:pointer;}
.barwrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12.5px;}
.barbg{flex:1;height:8px;background:var(--borda);border-radius:5px;overflow:hidden;}
.barfg{height:100%;border-radius:5px;}
.empty{text-align:center;padding:30px;color:#94a3b8;font-size:14px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.search{max-width:240px;margin:0;}
@media(max-width:880px){
  .sidebar{position:fixed;left:-230px;height:100vh;z-index:30;}
  .sidebar.open{left:0;}
  .grid2{grid-template-columns:1fr;}
  .formgrid{grid-template-columns:1fr;}
  .topbar .menubtn{display:block;}
  .content{padding:14px;}
  .cards{grid-template-columns:repeat(2,1fr);gap:10px;}
  .card{padding:12px 14px;}
  .card .val{font-size:21px;}
  .panel{padding:14px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar > *{width:100%;}
  .search{max-width:none;}
  table{font-size:12.5px;white-space:nowrap;}
  .panel > div[style*="overflow-x"], .panel table{display:block;overflow-x:auto;}
  .modal{width:94vw;padding:18px;}
  .ai-panel{width:92vw;right:4vw;left:4vw;bottom:80px;}
  .ai-fab{width:50px;height:50px;font-size:20px;bottom:16px;right:16px;}
  #fatFab{bottom:16px;left:16px;padding:8px 12px;font-size:12px;}
  button.btn:not(.sm){width:100%;}
  .toolbar button.btn, .toolbar .search{width:100%;}
}
@media(max-width:480px){
  .cards{grid-template-columns:1fr 1fr;}
  .userchip div:not(.av){display:none;}
  h1#viewTitle{font-size:15px;}
}
.menubtn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--azul-escuro);}
@media(max-width:880px){.menubtn{display:block;}}
.photo-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1px solid var(--borda);}
.diary-photos{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="brand">Realcontrol<span>Rio</span></div>
    <div style="color:#64748b;font-size:13px;margin-bottom:18px;">Realtec Engenharia · Painel Interno</div>
    <label>Seu nome</label>
    <input id="loginNome" placeholder="Ex: João Silva">
    <button class="btn" style="width:100%;margin-top:6px;" onclick="App.login()">Entrar</button>
  </div>
</div>

<div class="app" id="appRoot" style="display:none;">
  <div class="sidebar" id="sidebar">
    <div class="logo">Realcontrol<span>Rio</span></div>
    <div class="navitem active" data-view="obras"><span class="ic">🏗️</span>Obras &amp; Custos</div>
    <div class="navitem" data-view="dashboard"><span class="ic">📊</span>Dashboard</div>
    <div class="navitem" data-view="estoque"><span class="ic">📦</span>Estoque</div>
    <div class="navitem" data-view="colaboradores"><span class="ic">👷</span>Colaboradores</div>
    <div class="navitem" data-view="diario"><span class="ic">📋</span>Diário de Obra</div>
    <div class="navitem" data-view="financeiro"><span class="ic">💰</span>Financeiro</div>
    <div class="navitem" data-view="relatorios"><span class="ic">📄</span>Relatórios</div>
    <div style="margin-top:auto;padding:14px 18px;font-size:11px;color:rgba(255,255,255,.4);">v1.0 · Uso interno</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="menubtn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 id="viewTitle">Dashboard Executivo</h1>
      </div>
      <div class="userchip">
        <div class="av" id="avInit">J</div>
        <div><div id="topNome" style="font-weight:600;">—</div></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="ai-fab" id="aiFab" onclick="AI.toggle()">🤖</div>
<button id="fatFab" onclick="App.go('faturamento')" style="position:fixed;bottom:24px;left:24px;background:#fff;color:var(--azul-escuro);border:1px solid var(--borda);padding:9px 16px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.12);z-index:40;">💰 Faturamento</button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-head"><span>Assistente RealcontrolRio</span><span style="cursor:pointer" onclick="AI.toggle()">✕</span></div>
  <div class="ai-msgs" id="aiMsgs"></div>
  <div class="ai-input">
    <input id="aiInput" placeholder="Pergunte algo..." onkeydown="if(event.key==='Enter')AI.send()">
    <button onclick="AI.send()">➤</button>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== STORAGE LAYER ===================== */
const DB_KEY = "realcontrolrio_db_v1";
let DB = null;

function seedDB(){
  return {
    obras:[],
    estoque:[],
    movimentos:[],
    colaboradores:[],
    presencas:[],
    diario:[],
    custosMensais:[],
    lancamentosFin:[],
    nextId:{obras:1,estoque:1,colaboradores:1,diario:1,movimentos:1,presencas:1,lancamentosFin:1}
  };
}

async function loadDB(){
  try{
    const r = await window.storage.get(DB_KEY, true);
    DB = JSON.parse(r.value);
  }catch(e){
    DB = seedDB();
    await saveDB();
  }
}
async function saveDB(){
  try{ await window.storage.set(DB_KEY, JSON.stringify(DB), true); }
  catch(e){ console.error("erro ao salvar",e); }
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function fmt(n){ return "R$ "+Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function obraNome(id){ const o=DB.obras.find(o=>o.id==id); return o?o.nome:"—"; }

function calcSaldoObra(obraId){
  const obra = DB.obras.find(o=>o.id===obraId);
  if(!obra) return {inicial:0,despesas:0,receber:0,recebido:0,saldo:0};
  const lans = DB.lancamentosFin.filter(l=>l.obraId===obraId);
  const despesas = lans.filter(l=>l.tipo==='despesa'||l.tipo==='locacao').reduce((s,l)=>s+l.valor,0);
  const receber = lans.filter(l=>l.tipo==='a_receber'&&l.status==='pendente').reduce((s,l)=>s+l.valor,0);
  const recebido = lans.filter(l=>l.tipo==='a_receber'&&l.status==='recebido').reduce((s,l)=>s+l.valor,0);
  const inicial = obra.faturamentoInicial||0;
  const saldo = inicial - despesas + recebido;
  return {inicial,despesas,receber,recebido,saldo};
}

/* ===================== APP / ROUTER ===================== */
const App = {
  user:{nome:""},
  view:"dashboard",

  async login(){
    const nome=document.getElementById('loginNome').value.trim();
    if(!nome){ alert("Informe seu nome para entrar."); return; }
    this.user={nome};
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appRoot').style.display='flex';
    document.getElementById('topNome').textContent=nome;
    document.getElementById('avInit').textContent=nome[0].toUpperCase();
    await loadDB();
    this.bindNav();
    this.go('obras');
    AI.greet(nome);
  },

  bindNav(){
    document.querySelectorAll('.navitem').forEach(el=>{
      el.onclick=()=>{ this.go(el.dataset.view); document.getElementById('sidebar').classList.remove('open'); };
    });
  },

  go(view){
    this.view=view;
    document.querySelectorAll('.navitem').forEach(e=>e.classList.toggle('active', e.dataset.view===view));
    const titles={dashboard:"Dashboard Executivo",obras:"Controle de Obras",estoque:"Estoque de Materiais",
      colaboradores:"Colaboradores",diario:"Diário de Obra",financeiro:"Controle Financeiro",relatorios:"Relatórios",faturamento:"Faturamento das Obras"};
    document.getElementById('viewTitle').textContent=titles[view];
    Views[view]();
  }
};

/* ===================== MODAL HELPERS ===================== */
function openModal(html){
  document.getElementById('modalBody').innerHTML = `<span class="close-x" onclick="closeModal()">✕</span>${html}`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }

/* ===================== VIEWS ===================== */
const Views = {};
let chartRefs = {};
function destroyCharts(){ Object.values(chartRefs).forEach(c=>c && c.destroy()); chartRefs={}; }

Views.dashboard = function(){
  destroyCharts();
  const obrasAtivas = DB.obras.filter(o=>o.status==='ativo').length;
  const obrasFinalizadas = DB.obras.filter(o=>o.status==='finalizado').length;
  const custoTotal = DB.obras.reduce((s,o)=>s+o.custoReal,0);
  const receitaPrevista = DB.obras.reduce((s,o)=>s+o.orcamento,0);
  const margem = receitaPrevista? (((receitaPrevista-custoTotal)/receitaPrevista)*100).toFixed(1):0;
  const estoqueCritico = DB.estoque.filter(e=>e.qtd<=e.minimo).length;
  const equipesAtivas = new Set(DB.colaboradores.filter(c=>DB.obras.find(o=>o.id===c.obraId&&o.status==='ativo')).map(c=>c.obraId)).size;
  const criticas = DB.obras.filter(o=>o.custoReal>o.orcamento*0.95 && o.status!=='finalizado');
  const totaisFat = DB.obras.reduce((acc,o)=>{ const s=calcSaldoObra(o.id); acc.receber+=s.receber; acc.saldo+=s.saldo; return acc; },{receber:0,saldo:0});

  document.getElementById('content').innerHTML = `
    <div class="panel" style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;justify-content:space-between;border:2px solid ${totaisFat.saldo<0?'var(--vermelho)':'var(--verde)'};">
      <div>
        <div class="lbl" style="font-size:13px;">💰 Valores a Receber (pendentes)</div>
        <div style="font-size:30px;font-weight:800;color:var(--amarelo);">${fmt(totaisFat.receber)}</div>
      </div>
      <div style="border-left:1px solid var(--borda);height:48px;"></div>
      <div>
        <div class="lbl" style="font-size:13px;">Saldo Geral de Faturamento</div>
        <div style="font-size:30px;font-weight:800;color:${totaisFat.saldo<0?'var(--vermelho)':'var(--verde)'};">
          ${totaisFat.saldo<0?'⚠️ ':''}${fmt(totaisFat.saldo)}
        </div>
      </div>
      <button class="btn" onclick="App.go('faturamento')">Ver Faturamento Completo</button>
    </div>

    <div class="cards">
      <div class="card"><div class="lbl">Obras Ativas</div><div class="val">${obrasAtivas}</div></div>
      <div class="card"><div class="lbl">Obras Finalizadas</div><div class="val">${obrasFinalizadas}</div></div>
      <div class="card"><div class="lbl">Custo Total</div><div class="val">${fmt(custoTotal)}</div></div>
      <div class="card"><div class="lbl">Receita Prevista</div><div class="val">${fmt(receitaPrevista)}</div></div>
      <div class="card"><div class="lbl">Margem Estimada</div><div class="val" style="color:${margem>=0?'var(--verde)':'var(--vermelho)'}">${margem}%</div></div>
      <div class="card"><div class="lbl">Estoque Crítico</div><div class="val" style="color:${estoqueCritico?'var(--vermelho)':'var(--azul-escuro)'}">${estoqueCritico} itens</div></div>
      <div class="card"><div class="lbl">Equipes Ativas</div><div class="val">${equipesAtivas}</div></div>
    </div>

    <div class="panel">
      <div class="toolbar"><h3 style="margin:0;">⚠️ Obras Críticas (custo próximo/acima do orçamento)</h3>
      <button class="btn" onclick="Reports.exportFull()">📤 Exportar Relatório</button></div>
      ${criticas.length? criticas.map(o=>`
        <div class="barwrap"><strong style="width:170px;">${o.nome}</strong>
        <div class="barbg"><div class="barfg" style="width:${Math.min(100,(o.custoReal/o.orcamento*100))}%;background:${o.custoReal>o.orcamento?'var(--vermelho)':'var(--amarelo)'}"></div></div>
        <span>${fmt(o.custoReal)} / ${fmt(o.orcamento)}</span></div>`).join(''):'<div class="empty">Nenhuma obra em estado crítico 👍</div>'}
    </div>

    <div class="grid2">
      <div class="panel"><h3>Custo Previsto vs Realizado (por obra)</h3><canvas id="chPrevReal" height="220"></canvas></div>
      <div class="panel"><h3>Consumo de Materiais por Obra</h3><canvas id="chConsumo" height="220"></canvas></div>
    </div>
    <div class="panel"><h3>Evolução de Custos Mensais</h3><canvas id="chEvolucao" height="100"></canvas></div>
  `;

  chartRefs.prevReal = new Chart(document.getElementById('chPrevReal'),{
    type:'bar',
    data:{labels:DB.obras.map(o=>o.nome),
      datasets:[
        {label:'Previsto',data:DB.obras.map(o=>o.orcamento),backgroundColor:'#1E88E5'},
        {label:'Realizado',data:DB.obras.map(o=>o.custoReal),backgroundColor:'#0B1F3A'}
      ]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}}}
  });

  const consumoPorObra = {};
  DB.movimentos.filter(m=>m.tipo==='saida').forEach(m=>{
    consumoPorObra[m.obraId]=(consumoPorObra[m.obraId]||0)+m.qtd;
  });
  chartRefs.consumo = new Chart(document.getElementById('chConsumo'),{
    type:'doughnut',
    data:{labels:Object.keys(consumoPorObra).map(id=>obraNome(id)),
      datasets:[{data:Object.values(consumoPorObra),backgroundColor:['#1E88E5','#0B1F3A','#1FA15A','#E5A823','#D64545']}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}}}
  });

  chartRefs.evolucao = new Chart(document.getElementById('chEvolucao'),{
    type:'line',
    data:{labels:DB.custosMensais.map(c=>c.mes),
      datasets:[
        {label:'Previsto',data:DB.custosMensais.map(c=>c.previsto),borderColor:'#1E88E5',tension:.3},
        {label:'Realizado',data:DB.custosMensais.map(c=>c.realizado),borderColor:'#0B1F3A',tension:.3}
      ]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}}}
  });
};

/* -------- OBRAS -------- */
Views.obras = function(){
  document.getElementById('content').innerHTML = `
    <div class="panel" style="background:linear-gradient(135deg,#0B1F3A,#142d52);border:none;">
      <h3 style="color:#fff;margin-bottom:12px;">⚡ Ações Rápidas do Dia</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" onclick="Obras.formNew()">+ Nova Obra</button>
        <button class="btn" style="background:#1FA15A" onclick="Estoque.movModal()">↕️ Entrada/Saída Estoque</button>
        <button class="btn" style="background:#E5A823" onclick="Colab.presencaModal()">✅ Registrar Presença</button>
        <button class="btn" style="background:#1E88E5" onclick="Diario.formNew()">📋 Novo Diário</button>

    `);

      fase:document.getElementById('f_fase').value,

      custoReal:Number(document.getElementById('f_custo').value)||0,
      progresso:Number(document.getElementById('f_prog').value)||0
    };

    if(id){

      data.id = DB.nextId.obras++; DB.obras.push(data);

};

      <button class="btn" style="width:100%" onclick="Diario.save()">Salvar Registro</button>
    `);
  },
  async save(){
    const file=document.getElementById('dr_foto').files[0];
    const fotos=[];
    const finish=async ()=>{
      DB.diario.push({id:DB.nextId.diario++, obraId:Number(document.getElementById('dr_obra').value),
        fase:document.getElementById('dr_fase').value, data:document.getElementById('dr_data').value,
        texto:document.getElementById('dr_texto').value.trim(), fotos});
      await saveDB(); closeModal(); toast("Registro salvo no diário."); Views.diario();
    };
    if(file){
      const reader=new FileReader();
      reader.onload=async ()=>{ fotos.push(reader.result); await finish(); };
      reader.readAsDataURL(file);
    } else { await finish(); }
  }
};

    <div class="panel">
      <div class="toolbar"><h3 style="margin:0;">⏳ Valores a Receber (Pendentes)</h3></div>
      <table>
        <tr><th>Obra</th><th>Descrição</th><th>Valor</th><th>Data</th><th></th></tr>
        ${DB.lancamentosFin.filter(l=>l.tipo==='a_receber'&&l.status==='pendente').sort((a,b)=>b.data.localeCompare(a.data)).map(l=>`
          <tr><td>${obraNome(l.obraId)}</td><td>${l.descricao}</td><td style="color:var(--amarelo)">${fmt(l.valor)}</td><td>${new Date(l.data+'T12:00').toLocaleDateString('pt-BR')}</td>
          <td><button class="btn green sm" onclick="Fat.marcarRecebido(${l.id})">✅ Recebido</button></td></tr>
        `).join('') || '<tr><td colspan="5" class="empty">Nenhum valor pendente</td></tr>'}
      </table>
    </div>

    <div class="panel">
      <div class="toolbar"><h3 style="margin:0;">✅ Recebimentos Confirmados</h3></div>
      <table>
        <tr><th>Obra</th><th>Descrição</th><th>Valor</th><th>Recebido em</th></tr>
        ${DB.lancamentosFin.filter(l=>l.tipo==='a_receber'&&l.status==='recebido').sort((a,b)=>(b.dataRecebimento||'').localeCompare(a.dataRecebimento||'')).map(l=>`
          <tr><td>${obraNome(l.obraId)}</td><td>${l.descricao}</td><td style="color:var(--verde)">${fmt(l.valor)}</td><td>${l.dataRecebimento? new Date(l.dataRecebimento+'T12:00').toLocaleDateString('pt-BR'):'—'}</td></tr>
        `).join('') || '<tr><td colspan="4" class="empty">Nenhum recebimento confirmado ainda</td></tr>'}
      </table>
    </div>
  `;
};

const Fat = {
  formNew(){
    if(!DB.obras.length){ alert("Cadastre uma obra antes de lançar valores de faturamento."); return; }
    openModal(`
      <h3>Novo Lançamento Financeiro</h3>
      <label>Obra</label><select id="ft_obra">${DB.obras.map(o=>`<option value="${o.id}">${o.nome}</option>`).join('')}</select>
      <label>Tipo de Lançamento</label>
      <select id="ft_tipo" onchange="Fat.atualizarLabel()">
        <option value="a_receber">A Receber (trabalho feito, ainda não pago)</option>
        <option value="despesa">Despesa Geral</option>
        <option value="locacao">Locação (equipamento/aluguel)</option>
      </select>
      <label id="ft_descLabel">Nome do Trabalho / Serviço Realizado</label>
      <input id="ft_desc" placeholder="Ex: Medição 2ª etapa - estrutura">
      <div class="formgrid">
        <div><label id="ft_valorLabel">Valor do Trabalho (R$)</label><input id="ft_valor" type="number" min="0" step="0.01" placeholder="0,00"></div>
        <div><label>Data</label><input id="ft_data" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div id="ft_erro" style="color:var(--vermelho);font-size:12.5px;margin:-4px 0 8px;display:none;"></div>
      <button class="btn" style="width:100%" onclick="Fat.save()">Salvar Lançamento</button>
    `);
  },
  atualizarLabel(){
    const tipo=document.getElementById('ft_tipo').value;
    const lblDesc=document.getElementById('ft_descLabel');
    const lblValor=document.getElementById('ft_valorLabel');
    const inputDesc=document.getElementById('ft_desc');
    if(tipo==='a_receber'){
      lblDesc.textContent='Nome do Trabalho / Serviço Realizado';
      lblValor.textContent='Valor do Trabalho (R$)';
      inputDesc.placeholder='Ex: Medição 2ª etapa - estrutura';
    } else if(tipo==='locacao'){
      lblDesc.textContent='Nome da Locação';
      lblValor.textContent='Valor da Locação (R$)';
      inputDesc.placeholder='Ex: Locação de andaime metálico';
    } else {
      lblDesc.textContent='Descrição da Despesa';
      lblValor.textContent='Valor da Despesa (R$)';
      inputDesc.placeholder='Ex: Combustível, frete, materiais diversos...';
    }
  },
  async save(){
    const obraSel=document.getElementById('ft_obra');
    const tipo=document.getElementById('ft_tipo').value;
    const desc=document.getElementById('ft_desc').value.trim();
    const valorRaw=document.getElementById('ft_valor').value;
    const valor=Number(valorRaw);
    const erroEl=document.getElementById('ft_erro');
    erroEl.style.display='none';

    if(!obraSel || !obraSel.value){
      erroEl.textContent='Selecione uma obra.'; erroEl.style.display='block'; return;
    }
    if(!desc){
      erroEl.textContent='Informe o nome/descrição do trabalho.'; erroEl.style.display='block'; return;
    }
    if(!valorRaw || isNaN(valor) || valor<=0){
      erroEl.textContent='Informe um valor numérico maior que zero.'; erroEl.style.display='block'; return;
    }

    const lan={ id:DB.nextId.lancamentosFin++, obraId:Number(obraSel.value),
      tipo, descricao:desc, valor, data:document.getElementById('ft_data').value || new Date().toISOString().slice(0,10) };
    if(tipo==='a_receber') lan.status='pendente';
    DB.lancamentosFin.push(lan);
    await saveDB(); closeModal(); toast("Lançamento registrado com sucesso."); Views.faturamento();
  },
  async marcarRecebido(id){
    const lan = DB.lancamentosFin.find(l=>l.id===id);
    if(!lan) return;
    lan.status='recebido';
    lan.dataRecebimento = new Date().toISOString().slice(0,10);
    await saveDB(); toast("Recebimento confirmado — saldo atualizado."); Views.faturamento();
  }
};

  document.getElementById('content').innerHTML = `
    <div class="grid2">
      <div class="panel">
        <h3>📗 Exportar Excel (CSV)</h3>
        <p style="font-size:13.5px;color:#64748b;">Gera planilhas separadas para cada módulo.</p>

        <button class="btn ghost" style="width:100%;margin-bottom:8px;" onclick="Reports.csv('estoque')">Estoque</button>
        <button class="btn ghost" style="width:100%;margin-bottom:8px;" onclick="Reports.csv('colaboradores')">Colaboradores</button>
        <button class="btn ghost" style="width:100%;margin-bottom:8px;" onclick="Reports.csv('custos')">Custos por Obra</button>

const Reports = {
  exportFull(){ App.go('relatorios'); },
  download(filename, content, mime){
    const blob=new Blob([content],{type:mime});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
  },
  csv(tipo){
    let rows=[];
    if(tipo==='obras'){
      rows=[['Obra','Cliente','Status','Fase','Progresso(%)','Orçamento','Custo Real']];
      DB.obras.forEach(o=>rows.push([o.nome,o.cliente,o.status,o.fase,o.progresso,o.orcamento,o.custoReal]));
    } else if(tipo==='estoque'){
      rows=[['Material','Unidade','Qtd','Mínimo','Obra']];
      DB.estoque.forEach(e=>rows.push([e.nome,e.unidade,e.qtd,e.minimo,obraNome(e.obraId)]));
    } else if(tipo==='colaboradores'){
      rows=[['Nome','Função','Pagamento','Valor','Obra']];
      DB.colaboradores.forEach(c=>rows.push([c.nome,c.funcao,c.tipoPagto,c.valor,obraNome(c.obraId)]));
    } else if(tipo==='custos'){
      rows=[['Obra','Orçamento','Custo Real','Variação']];
      DB.obras.forEach(o=>rows.push([o.nome,o.orcamento,o.custoReal,o.custoReal-o.orcamento]));
    } else if(tipo==='movimentos'){
      rows=[['Material','Tipo','Qtd','Data','Obra']];
      DB.movimentos.forEach(m=>{
        const mat=DB.estoque.find(e=>e.id===m.materialId);
        rows.push([mat?mat.nome:'—',m.tipo,m.qtd,m.data,obraNome(m.obraId)]);
      });
    }
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
    this.download(`${tipo}_realcontrolrio.csv`, "\uFEFF"+csv, "text/csv;charset=utf-8");
    toast("Arquivo CSV gerado.");
  },
  pdf(){
    const obraId=document.getElementById('rep_obra').value;
    const obras = obraId? DB.obras.filter(o=>o.id==obraId) : DB.obras;
    const custoTotal=obras.reduce((s,o)=>s+o.custoReal,0);
    const orcTotal=obras.reduce((s,o)=>s+o.orcamento,0);
    const margem = orcTotal? (((orcTotal-custoTotal)/orcTotal)*100).toFixed(1):0;
    const conclusao = margem>=0
      ? `As obras analisadas apresentam margem estimada positiva de ${margem}%, indicando controle financeiro adequado no período.`
      : `As obras analisadas apresentam estouro de orçamento de ${Math.abs(margem)}%, recomendando-se revisão de custos e renegociação de fornecedores.`;

    const html = `
      <html><head><meta charset="utf-8"><title>Relatório RealcontrolRio</title>
      <style>
        body{font-family:Arial,sans-serif;color:#0B1F3A;padding:40px;}
        h1{color:#0B1F3A;border-bottom:4px solid #1E88E5;padding-bottom:10px;}
        h2{color:#1E88E5;margin-top:34px;}
        table{width:100%;border-collapse:collapse;margin-top:10px;}
        th,td{border:1px solid #ddd;padding:8px;font-size:13px;}
        th{background:#F5F7FA;}
        .cover{text-align:center;margin-top:120px;}
        .cover h1{font-size:34px;border:none;}
        .footer{margin-top:60px;font-size:11px;color:#888;text-align:center;}
        .pagebreak{page-break-before:always;}
      </style></head><body>
      <div class="cover">
        <h1>RealcontrolRio</h1>
        <p style="font-size:18px;">Relatório Executivo de Obras</p>
        <p>${obraId?obraNome(obraId):'Relatório Geral · Todas as Obras'}</p>
        <p>Realtec Engenharia — ${new Date().toLocaleDateString('pt-BR')}</p>
      </div>
      <div class="pagebreak"></div>
      <h1>Resumo Executivo</h1>
      <p>Orçamento total previsto: <strong>${fmt(orcTotal)}</strong></p>
      <p>Custo real acumulado: <strong>${fmt(custoTotal)}</strong></p>
      <p>Margem estimada: <strong>${margem}%</strong></p>

      <h2>Custos Detalhados por Obra</h2>
      <table>
        <tr><th>Obra</th><th>Cliente</th><th>Status</th><th>Orçamento</th><th>Custo Real</th><th>Variação</th></tr>
        ${obras.map(o=>`<tr><td>${o.nome}</td><td>${o.cliente}</td><td>${o.status}</td><td>${fmt(o.orcamento)}</td><td>${fmt(o.custoReal)}</td><td>${fmt(o.custoReal-o.orcamento)}</td></tr>`).join('')}
      </table>

      <h2>Conclusão Automática</h2>
      <p>${conclusao}</p>

      <div class="footer">Documento gerado automaticamente pelo sistema RealcontrolRio — uso interno Realtec Engenharia.</div>
      </body></html>`;
    const w=window.open('','_blank');
    w.document.write(html); w.document.close();
    setTimeout(()=>w.print(), 400);
    toast("Relatório PDF gerado. Use 'Salvar como PDF' na janela de impressão.");
  }
};

/* ===================== AI ASSISTANT (LÓGICA INTERNA) ===================== */
const AI = {
  toggle(){ document.getElementById('aiPanel').classList.toggle('show'); },
  greet(nome){
    const hora=new Date().getHours();
    const periodo = hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
    this.push('bot', `${periodo}, ${nome.split(' ')[0]}. Como posso te ajudar hoje? Pergunte sobre obras, estoque, equipe ou custos.`);
  },
  push(who, text){
    const m=document.getElementById('aiMsgs');
    const div=document.createElement('div');
    div.className=`ai-msg ${who}`; div.textContent=text;
    m.appendChild(div); m.scrollTop=m.scrollHeight;
  },
  send(){
    const inp=document.getElementById('aiInput');
    const q=inp.value.trim(); if(!q) return;
    this.push('user', q); inp.value='';
    setTimeout(()=>this.push('bot', this.answer(q)), 250);
  },
  answer(q){
    const low = q.toLowerCase();

    if(low.includes('obra') && (low.includes('mais cara')||low.includes('mais custosa')||low.includes('maior custo'))){
      const o=[...DB.obras].sort((a,b)=>b.custoReal-a.custoReal)[0];
      return `A obra com maior custo real é "${o.nome}" (${fmt(o.custoReal)} de ${fmt(o.orcamento)} previstos).`;
    }
    if(low.includes('critic') || (low.includes('obra')&&low.includes('atenção'))){
      const c=DB.obras.filter(o=>o.custoReal>o.orcamento*0.95 && o.status!=='finalizado');
      return c.length? `Obras em estado crítico: ${c.map(o=>o.nome).join(', ')}.` : 'Nenhuma obra em estado crítico no momento.';
    }
    if(low.includes('cimento') || low.match(/temos .* suficiente/)){
      const mat = DB.estoque.find(e=> low.includes(e.nome.toLowerCase().split(' ')[0]));
      if(mat) return mat.qtd<=mat.minimo
        ? `Estoque de ${mat.nome} está baixo: ${mat.qtd} ${mat.unidade} (mínimo: ${mat.minimo}). Recomenda-se reposição.`
        : `Estoque de ${mat.nome} está adequado: ${mat.qtd} ${mat.unidade} disponíveis.`;
    }
    if(low.includes('estoque') && (low.includes('baixo')||low.includes('crítico')||low.includes('critico')||low.includes('falta'))){
      const baixos = DB.estoque.filter(e=>e.qtd<=e.minimo);
      return baixos.length? `Itens com estoque crítico: ${baixos.map(e=>`${e.nome} (${e.qtd} ${e.unidade})`).join(', ')}.` : 'Nenhum item em estoque crítico.';
    }
    if(low.includes('trabalhou') || (low.includes('quem') && low.includes('obra'))){
      const obraMatch = DB.obras.find(o=> low.includes(o.nome.toLowerCase().split(' ')[0]));
      const presentesHoje = DB.presencas.filter(p=>p.presente && (!obraMatch || p.obraId===obraMatch.id));
      if(!presentesHoje.length) return 'Não encontrei registros de presença para essa obra.';
      const nomes = presentesHoje.map(p=>DB.colaboradores.find(c=>c.id===p.colabId)?.nome).filter(Boolean);
      return `Colaboradores registrados: ${[...new Set(nomes)].join(', ')}.`;
    }
    if(low.includes('resumo') && low.includes('semana')){
      const custoTotal=DB.obras.reduce((s,o)=>s+o.custoReal,0);
      const criticos=DB.estoque.filter(e=>e.qtd<=e.minimo).length;
      const registros=DB.diario.length;
      return `Resumo: ${DB.obras.filter(o=>o.status==='ativo').length} obras ativas, custo acumulado de ${fmt(custoTotal)}, ${criticos} itens de estoque crítico e ${registros} registros no diário de obra.`;
    }
    if(low.includes('margem')){
      const orc=DB.obras.reduce((s,o)=>s+o.orcamento,0);
      const custo=DB.obras.reduce((s,o)=>s+o.custoReal,0);
      const m=(((orc-custo)/orc)*100).toFixed(1);
      return `A margem estimada consolidada é de ${m}%.`;
    }
    if(low.includes('colaborador') && low.includes('mais')){
      return `Atualmente há ${DB.colaboradores.length} colaboradores cadastrados no sistema, distribuídos entre ${DB.obras.length} obras.`;
    }
    if(low.includes('quantas obras')||((low.includes('obras'))&&low.includes('ativ'))){
      return `Existem ${DB.obras.filter(o=>o.status==='ativo').length} obras ativas, ${DB.obras.filter(o=>o.status==='pausado').length} pausadas e ${DB.obras.filter(o=>o.status==='finalizado').length} finalizadas.`;
    }
    return `Não tenho certeza sobre isso ainda. Posso responder sobre: obra mais cara, obras críticas, estoque de materiais, presença de equipe e resumo da semana.`;
  }
};
